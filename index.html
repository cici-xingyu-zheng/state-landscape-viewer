<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interneuron state landscapes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="masthead">
    <div class="wrap">
      <h1 id="site-title"></h1>
      <p class="intro" id="site-intro"></p>
      <div class="masthead-row">
        <div class="dataset-picker">
          <label for="dataset-select">Dataset</label>
          <select id="dataset-select"></select>
        </div>
        <span class="eq mono" id="site-eq"></span>
      </div>
    </div>
  </header>

  <main class="wrap" id="sections"></main>

  <footer class="foot">
    <div class="wrap">Pick a dataset above, then click a card to open its default view or a chip to jump straight to that projection. Rotate, zoom, and hover any surface; toggle populations from the legend inside each plot.</div>
  </footer>

  <template id="glyph">
    <svg class="glyph" width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
      <ellipse cx="20" cy="21" rx="16" ry="9"  stroke="currentColor" stroke-width="1" opacity=".35"/>
      <ellipse cx="20" cy="21" rx="11" ry="6"  stroke="currentColor" stroke-width="1" opacity=".55"/>
      <ellipse cx="20" cy="21" rx="6"  ry="3.4" stroke="currentColor" stroke-width="1.2" opacity=".8"/>
      <circle  cx="20" cy="21" r="1.6" fill="currentColor"/>
    </svg>
  </template>

  <script src="config.js"></script>
  <script>
    document.getElementById("site-title").textContent = SITE.title;
    document.getElementById("site-intro").innerHTML = SITE.intro;
    document.getElementById("site-eq").textContent = SITE.equation;

    const glyphTpl = document.getElementById("glyph").innerHTML;
    const root = document.getElementById("sections");
    const dsSelect = document.getElementById("dataset-select");

    // populate the dataset dropdown
    SITE.datasets.forEach(function (d) {
      const opt = document.createElement("option");
      opt.value = d.id;
      opt.textContent = d.name;
      dsSelect.appendChild(opt);
    });

    // initial dataset: ?d= if valid, otherwise the first one
    const params = new URLSearchParams(location.search);
    let activeId = params.get("d");
    if (!SITE.datasets.some(function (d) { return d.id === activeId; })) {
      activeId = SITE.datasets[0].id;
    }
    dsSelect.value = activeId;

    function renderSections(datasetId) {
      root.innerHTML = "";
      const sections = getSections(getDataset(datasetId));
      for (const section of sections) {
        const sec = document.createElement("section");
        sec.className = "group accent-" + section.accent;
        sec.innerHTML =
          '<div class="group-head">' +
            '<div class="eyebrow">' + section.eyebrow + '</div>' +
            '<h2>' + section.heading + '</h2>' +
            '<p class="blurb">' + section.blurb + '</p>' +
          '</div>' +
          '<div class="cards"></div>';
        const cards = sec.querySelector(".cards");
        for (const page of section.pages) {
          const base = "view.html?d=" + encodeURIComponent(datasetId) + "&p=" + encodeURIComponent(page.id);
          const pills = page.views.map(function (v, i) {
            return '<a class="pill" href="' + base + '&v=' + i + '">' + v.label + '</a>';
          }).join("");
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML =
            '<a class="card-main" href="' + base + '&v=0">' +
              glyphTpl +
              '<div class="name">' + page.name + '</div>' +
              '<div class="meta">' + page.meta + '</div>' +
            '</a>' +
            '<div class="pills">' + pills + '</div>';
          cards.appendChild(card);
        }
        root.appendChild(sec);
      }
    }

    function setDataset(datasetId, updateUrl) {
      renderSections(datasetId);
      if (updateUrl) {
        try {
          const url = new URL(location);
          url.searchParams.set("d", datasetId);
          history.replaceState(null, "", url);
        } catch (e) { /* ignore */ }
      }
    }

    dsSelect.addEventListener("change", function () { setDataset(dsSelect.value, true); });
    setDataset(activeId, false);
  </script>
</body>
</html>
