<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interneuron state landscapes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="masthead">
    <div class="wrap">
      <h1 id="site-title"></h1>
      <p id="site-subtitle"></p>
      <span class="eq mono" id="site-eq"></span>
    </div>
  </header>

  <main class="wrap" id="sections"></main>

  <footer class="foot">
    <div class="wrap">Click a card to open its default view, or a chip to jump straight to that projection. Rotate, zoom, and hover any surface; toggle populations from the legend inside each plot.</div>
  </footer>

  <template id="glyph">
    <svg class="glyph" width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
      <ellipse cx="20" cy="21" rx="16" ry="9"  stroke="currentColor" stroke-width="1" opacity=".35"/>
      <ellipse cx="20" cy="21" rx="11" ry="6"  stroke="currentColor" stroke-width="1" opacity=".55"/>
      <ellipse cx="20" cy="21" rx="6"  ry="3.4" stroke="currentColor" stroke-width="1.2" opacity=".8"/>
      <circle  cx="20" cy="21" r="1.6" fill="currentColor"/>
    </svg>
  </template>

  <script src="config.js"></script>
  <script>
    document.getElementById("site-title").textContent = SITE.title;
    document.getElementById("site-subtitle").textContent = SITE.subtitle;
    document.getElementById("site-eq").textContent = SITE.equation;

    const glyphTpl = document.getElementById("glyph").innerHTML;
    const root = document.getElementById("sections");

    for (const section of SITE.sections) {
      const sec = document.createElement("section");
      sec.className = "group accent-" + section.accent;
      sec.innerHTML =
        '<div class="group-head">' +
          '<div class="eyebrow">' + section.eyebrow + '</div>' +
          '<h2>' + section.heading + '</h2>' +
          '<p class="blurb">' + section.blurb + '</p>' +
        '</div>' +
        '<div class="cards"></div>';
      const cards = sec.querySelector(".cards");

      for (const page of section.pages) {
        const pid = encodeURIComponent(page.id);
        const pills = page.views
          .map(function (v, i) {
            return '<a class="pill" href="view.html?p=' + pid + '&v=' + i + '">' + v.label + '</a>';
          })
          .join("");

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML =
          '<a class="card-main" href="view.html?p=' + pid + '&v=0">' +
            glyphTpl +
            '<div class="name">' + page.name + '</div>' +
            '<div class="meta">' + page.meta + '</div>' +
          '</a>' +
          '<div class="pills">' + pills + '</div>';
        cards.appendChild(card);
      }
      root.appendChild(sec);
    }
  </script>
</body>
</html>
